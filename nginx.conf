#user  jcdn;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    
proxy_buffer_size 1024k; #иХжц╢ЗюМ╥ЧнЯфВё╗nginxё╘╠ё╢Фсц╩╖м╥пео╒╣д╩╨ЁЕгЬ╢Сп║
proxy_buffers 16 1024k; #proxy_buffers╩╨ЁЕгЬё╛мЬрЁф╫╬Ытз32kртоб╣диХжц
proxy_busy_buffers_size 2048k; #╦ъ╦╨╨иоб╩╨ЁЕ╢Сп║ё╗proxy_buffers*2ё╘
proxy_temp_file_write_size 2048k;#иХ╤╗╩╨╢Фнд╪Ч╪п╢Сп║ё╛╢СсзуБ╦Жж╣ё╛╫╚╢сupstream╥ЧнЯфВ╢╚


    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

  client_header_buffer_size 20k;

    map $time_iso8601 $logdate {
    	'~^(?<ymd>\d{4}-\d{2}-\d{2})' $ymd;
    	default    'date-not-found';
    }

    #websocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format  main escape=json '{ "@timestamp": "$time_iso8601", '
            '"remote_addr": "$remote_addr",'
            '"costime": "$request_time",'
            '"realtime": "$upstream_response_time",'
            '"status": $status,'
            '"x_forwarded": "$http_x_forwarded_for",'
            '"referer": "$http_referer",'
            '"request": "$request",'
            '"upstr_addr": "$upstream_addr",'
            '"bytes":$body_bytes_sent,'
            '"dm":"$request_body",'
            '"agent": "$http_user_agent" }';




    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    error_log logs/error.log notice;
#lua_shared_dict limit 10m;
    #init_worker_by_lua_file luas/mylua/reload.lua;

    upstream people {
            server 127.0.0.1:8402;
            balancer_by_lua_file luas/mylua/balance.lua;

        }





lua_shared_dict clear 12k;
lua_shared_dict path 50m;
lua_shared_dict token 50m;

client_max_body_size 100M;
lua_package_path "/usr/local/openresty/nginx/luas/?.lua;;";


    server {
        #listen       3000;
        listen       8001;
        server_name  localhost;

        #charset koi8-r;
       charset utf-8;

        access_log  logs/access.log  main;




	location  /status {
            stub_status on;
            allow all;
        }


    

 
        






location /testaaa
{
   set $a 1;
   rewrite_by_lua "ngx.var.a =  21";
   
 set $b $a;

    echo "arg: $b";
}
  


       location / {
            #default_type 'text/html';



    
                     
            set $topath '';

	access_by_lua_file luas/mylua/access.lua;
	header_filter_by_lua_file luas/mylua/cors.lua;

	if ($request_method = 'OPTIONS') {

	     return 204;

	}

	    #set_by_lua_file $topath /lua/setvar.lua;
	    
	    #content_by_lua_file conf/lua/test.lua;
	    #content_by_lua "ngx.say('hello world2')";

                    log_by_lua_file luas/mylua/log.lua;

 proxy_pass_request_body on;
proxy_pass $topath$is_args$args;

             proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
             proxy_set_header x-forwarded-for $remote_addr;   


     }
  
	   

           


  location =/reload
  {
       default_type 'text/html';
       content_by_lua_file luas/mylua/reload.lua;


	    allow 127.0.0.1;
	    allow 10.19.97.0/24;
	    allow 10.19.245.0/24;
	    allow 10.19.145.0/24;
	    deny all;


#echo "args: args";
  }



        location /bb {
            
	    set $target ''; 
	    default_type 'text/html';
            #content_by_lua_file D:\fangj10\2023\openresty\sql1.lua;
	    
	    #content_by_lua_file D:\fangj10\2023\openresty\getpath.lua;
